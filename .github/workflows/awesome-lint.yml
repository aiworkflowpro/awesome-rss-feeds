name: Awesome Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: jmrp/action-awesome-lint@a310b97dba09bf8d0c7aaa35ef9fc0b34b0ee3bc # v1
